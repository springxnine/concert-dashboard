<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Concert Archives Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI'; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 30px 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 3em; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); font-weight: 700; }
        .loading { text-align: center; color: white; padding: 40px; }
        .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; }
        .stat-card .label { font-size: 0.85em; color: #999; text-transform: uppercase; margin-bottom: 12px; }
        .stat-card .value { font-size: 2.5em; font-weight: 700; color: #667eea; }
        .stat-card.green .value { color: #70AD47; }
        .stat-card.orange .value { color: #FF9F43; }
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        .section-title { color: white; font-size: 1.7em; margin: 50px 0 30px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-weight: 600; }
        .content-box { background: white; border-radius: 15px; padding: 35px; box-shadow: 0 10px 35px rgba(0,0,0,0.2); margin-bottom: 40px; }
        .breakdown-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .breakdown-card { background: #f8f9fb; padding: 20px; border-radius: 10px; border-left: 4px solid #667eea; }
        .breakdown-card h4 { font-weight: 600; color: #333; margin-bottom: 10px; }
        .breakdown-card .amount { font-size: 1.5em; color: #667eea; font-weight: 700; }
        .total-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 10px; text-align: center; grid-column: 1 / -1; color: white; }
        .total-card .amount { font-size: 2em; color: white; font-weight: 700; }
        .list-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .list-item { background: #f8f9fb; padding: 25px; border-radius: 10px; border-left: 4px solid #667eea; text-align: center; }
        .list-rank { font-size: 2em; margin-bottom: 12px; }
        .list-name { font-weight: 600; color: #333; margin-bottom: 10px; }
        .list-count { font-weight: 700; color: #667eea; font-size: 1.3em; }
        .footer { text-align: center; color: white; margin-top: 60px; padding: 30px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 CONCERT ARCHIVES DASHBOARD</h1>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p id="loadingText">Loading...</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card green">
                    <div class="label">Total Attended</div>
                    <div class="value" id="totalAttended">0</div>
                </div>
                <div class="stat-card orange">
                    <div class="label">Total Ticket Cost</div>
                    <div class="value" id="totalTicketCost">฿0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Favorite Artist</div>
                    <div class="value" id="favoriteArtist">-</div>
                </div>
            </div>

            <div class="section-title">💸 EXPENSES</div>
            <div class="content-box">
                <div class="breakdown-grid" id="expenseBreakdown"></div>
            </div>

            <div class="section-title">💵 INCOME</div>
            <div class="content-box">
                <div class="breakdown-grid" id="incomeBreakdown"></div>
            </div>

            <div class="section-title">🎤 TOP ARTISTS</div>
            <div class="content-box">
                <div class="list-grid" id="topArtists"></div>
            </div>
        </div>

        <div class="footer">
            <p>🎵 Concert Archives Dashboard</p>
        </div>
    </div>

    <script>
        const SHEET_ID = '1JjFwIutAXA4xtq4xgbrfH4DtknSuJ06YPaup5gijqtM';
        
        async function fetchSheet(gid) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
            const res = await fetch(url);
            const text = await res.text();
            return JSON.parse(text.substring(47).slice(0, -2));
        }
        
        async function loadData() {
            try {
                const [concerts, statistics] = await Promise.all([
                    fetchSheet(930759061),
                    fetchSheet(1894568605)
                ]);

                processData(concerts, statistics);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingText').textContent = '❌ ' + error.message;
            }
        }

        function getValue(cell) {
            if (!cell) return null;
            return cell.v !== undefined ? cell.v : null;
        }

        function parseNum(val) {
            if (!val) return 0;
            const num = parseFloat(String(val).replace(/[^0-9.-]/g, ''));
            return isNaN(num) ? 0 : num;
        }

        function fmt(num) {
            return Math.round(num).toLocaleString();
        }

        function processData(concerts, statistics) {
            // Process concerts
            const artists = {};
            let attended = 0;
            
            const concertRows = concerts.rows || [];
            for (let row of concertRows) {
                const cells = row.c || [];
                const status = getValue(cells[7]);
                const artist = getValue(cells[3]);
                
                if (status && String(status).includes('Attended')) {
                    attended++;
                    if (artist) {
                        const artistStr = String(artist).trim();
                        artists[artistStr] = (artists[artistStr] || 0) + 1;
                    }
                }
            }

            // Process Statistics sheet - Expense Breakdown (Row 43-49, Col A=Category, B=Total)
            const statsRows = statistics.rows || [];
            const expenseBreakdown = {};
            let expTotal = 0;
            
            // Row 43-49 = index 42-48
            for (let i = 42; i <= 48 && i < statsRows.length; i++) {
                const cells = statsRows[i].c || [];
                const cat = getValue(cells[0]);
                const val = getValue(cells[1]);
                
                if (cat && val) {
                    const catStr = String(cat).trim();
                    const amount = parseNum(val);
                    if (catStr && amount > 0) {
                        expenseBreakdown[catStr] = amount;
                        expTotal += amount;
                    }
                }
            }

            // Process Statistics sheet - Income Breakdown (Row 53-56, Col A=Category, B=Total)
            const incomeBreakdown = {};
            let incTotal = 0;
            
            // Row 53-56 = index 52-55
            for (let i = 52; i <= 55 && i < statsRows.length; i++) {
                const cells = statsRows[i].c || [];
                const cat = getValue(cells[0]);
                const val = getValue(cells[1]);
                
                if (cat && val) {
                    const catStr = String(cat).trim();
                    const amount = parseNum(val);
                    if (catStr && amount > 0) {
                        incomeBreakdown[catStr] = amount;
                        incTotal += amount;
                    }
                }
            }

            const topArtist = Object.entries(artists).sort((a, b) => b[1] - a[1])[0];

            document.getElementById('totalAttended').textContent = attended;
            document.getElementById('totalTicketCost').textContent = '฿0';
            document.getElementById('favoriteArtist').textContent = topArtist ? topArtist[0] : '-';

            // Expenses
            let expenseHtml = Object.entries(expenseBreakdown)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, val]) => `<div class="breakdown-card"><h4>${cat}</h4><div class="amount">฿${fmt(val)}</div></div>`)
                .join('');
            expenseHtml += `<div class="total-card"><h4>TOTAL EXPENSES</h4><div class="amount">฿${fmt(expTotal)}</div></div>`;
            document.getElementById('expenseBreakdown').innerHTML = expenseHtml;

            // Income
            let incomeHtml = Object.entries(incomeBreakdown)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, val]) => `<div class="breakdown-card"><h4>${cat}</h4><div class="amount">฿${fmt(val)}</div></div>`)
                .join('');
            incomeHtml += `<div class="total-card"><h4>TOTAL INCOME</h4><div class="amount">฿${fmt(incTotal)}</div></div>`;
            document.getElementById('incomeBreakdown').innerHTML = incomeHtml;

            // Top artists
            const topArtists = Object.entries(artists).sort((a, b) => b[1] - a[1]).slice(0, 3);
            document.getElementById('topArtists').innerHTML = topArtists
                .map(([name, count], i) => {
                    const emoji = ['🥇', '🥈', '🥉'][i];
                    return `<div class="list-item"><div class="list-rank">${emoji}</div><div class="list-name">${name}</div><div class="list-count">${count}x</div></div>`;
                }).join('');
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
