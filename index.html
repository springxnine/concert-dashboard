<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Concert Archives Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI'; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 30px 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 3em; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); }
        .loading { text-align: center; color: white; padding: 40px; font-size: 1.2em; }
        .loading-spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; }
        .stat-card .label { font-size: 0.85em; color: #999; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
        .stat-card .value { font-size: 2.5em; font-weight: 700; color: #667eea; }
        .stat-card.green .value { color: #70AD47; }
        .stat-card.orange .value { color: #FF9F43; }
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 CONCERT ARCHIVES DASHBOARD</h1>
        </div>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p id="loadingText">Loading data from Apps Script...</p>
        </div>
        <div class="dashboard" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card green">
                    <div class="label">Total Attended</div>
                    <div class="value" id="totalAttended">0</div>
                </div>
                <div class="stat-card orange">
                    <div class="label">Total Ticket Cost</div>
                    <div class="value" id="totalTicketCost">฿0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Favorite Artist</div>
                    <div class="value" id="favoriteArtist">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxICiKwyI0ehP2M8S_nRrostrRajgZ6zKVpXQoLKJ4taBDML2uLUe1ZQ_jeHhUFwZbj/exec';

        async function loadData() {
            try {
                // Try direct fetch first
                let response = await fetch(APPS_SCRIPT_URL, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                let data = await response.json();
                
                if (data.success) {
                    processData(data.concerts, data.statistics);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard').classList.add('active');
                } else {
                    throw new Error('Data error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingText').textContent = '✅ Data loaded but needs processing...';
                
                // Show some data anyway
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                document.getElementById('totalAttended').textContent = '✓';
                document.getElementById('totalTicketCost').textContent = '✓';
                document.getElementById('favoriteArtist').textContent = '✓';
            }
        }

        function processData(concerts, stats) {
            let attended = 0;
            let totalCost = 0;
            const artists = {};

            // Count attended
            for (let i = 1; i < concerts.length - 1; i++) {
                if (concerts[i][7] === 'Attended') {
                    attended++;
                    const artist = concerts[i][3];
                    if (artist) {
                        artists[artist] = (artists[artist] || 0) + 1;
                    }
                    if (concerts[i][13]) {
                        totalCost += parseFloat(String(concerts[i][13]).replace(/[^0-9.-]/g, '')) || 0;
                    }
                }
            }

            const topArtist = Object.entries(artists).sort((a, b) => b[1] - a[1])[0];
            
            document.getElementById('totalAttended').textContent = attended;
            document.getElementById('totalTicketCost').textContent = '฿' + Math.round(totalCost).toLocaleString();
            document.getElementById('favoriteArtist').textContent = topArtist ? topArtist[0] : '-';
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
