<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Concert Archives Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 50px; }
        .header h1 { font-size: 3.5em; font-weight: 700; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        .header p { font-size: 1.1em; opacity: 0.9; }
        
        .loading { text-align: center; color: white; padding: 60px 20px; }
        .loading-spinner { 
            display: inline-block; 
            width: 50px; 
            height: 50px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-top: 4px solid white; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 60px; }
        .stat-card { 
            background: white; 
            border-radius: 20px; 
            padding: 35px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); 
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 30px 70px rgba(0,0,0,0.2); }
        .stat-card .label { font-size: 0.9em; color: #999; text-transform: uppercase; margin-bottom: 15px; font-weight: 600; letter-spacing: 1px; }
        .stat-card .value { font-size: 3em; font-weight: 700; color: #667eea; }
        .stat-card.green .value { color: #70AD47; }
        .stat-card.orange .value { color: #FF9F43; }
        
        .section-title { color: white; font-size: 2em; margin: 60px 0 30px 0; font-weight: 700; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        
        .content-box { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); 
            margin-bottom: 50px;
        }
        
        .breakdown-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .breakdown-card { 
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f3f8 100%); 
            padding: 25px; 
            border-radius: 15px; 
            border-left: 5px solid #667eea;
            transition: transform 0.2s ease;
        }
        .breakdown-card:hover { transform: translateX(5px); }
        .breakdown-card h4 { font-weight: 600; color: #333; margin-bottom: 12px; font-size: 1em; }
        .breakdown-card .amount { font-size: 1.8em; color: #667eea; font-weight: 700; }
        
        .total-card { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            grid-column: 1 / -1;
        }
        .total-card h4 { color: white; font-weight: 600; margin-bottom: 12px; font-size: 0.95em; opacity: 0.9; }
        .total-card .amount { font-size: 2.2em; color: white; font-weight: 700; }
        
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        .footer { text-align: center; color: white; margin-top: 80px; padding: 30px; font-size: 1em; opacity: 0.85; }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2.5em; }
            .stats-grid { grid-template-columns: 1fr; }
            .stat-card { padding: 25px; }
            .stat-card .value { font-size: 2.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 CONCERT ARCHIVES</h1>
            <p>Dashboard</p>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p id="loadingText" style="font-size: 1.1em; margin-top: 20px;">Loading your data...</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card green">
                    <div class="label">Total Attended</div>
                    <div class="value" id="totalAttended">0</div>
                </div>
                <div class="stat-card orange">
                    <div class="label">Total Expense</div>
                    <div class="value" id="totalExpense">฿0</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Income</div>
                    <div class="value" id="totalIncome">฿0</div>
                </div>
            </div>

            <div class="section-title">💸 Expense Breakdown</div>
            <div class="content-box">
                <div class="breakdown-grid" id="expenseBreakdown"></div>
            </div>

            <div class="section-title">💵 Income Breakdown</div>
            <div class="content-box">
                <div class="breakdown-grid" id="incomeBreakdown"></div>
            </div>
        </div>

        <div class="footer">
            <p>✨ Real-time sync from Google Sheets ✨</p>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxICiKwyI0ehP2M8S_nRrostrRajgZ6zKVpXQoLKJ4taBDML2uLUe1ZQ_jeHhUFwZbj/exec';
        
        async function loadData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                
                if (data.success) {
                    processData(data);
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('dashboard').classList.add('active');
                } else {
                    throw new Error(data.error || 'Unknown error');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loadingText').textContent = '❌ Error: ' + error.message;
            }
        }

        function parseNum(val) {
            if (!val) return 0;
            const num = parseFloat(String(val).replace(/[^0-9.-]/g, ''));
            return isNaN(num) ? 0 : num;
        }

        function fmt(num) {
            return Math.round(num).toLocaleString();
        }

        function processData(data) {
            const concerts = data.concerts || [];
            const stats = data.statistics || [];
            
            // Count attended
            let attended = 0;
            for (let i = 1; i < concerts.length - 1; i++) {
                const row = concerts[i];
                if (row[7] && String(row[7]).includes('Attended')) {
                    attended++;
                }
            }

            // Expense from stats (row 42-48, col A=0, B=1)
            const expenses = {};
            let expTotal = 0;
            for (let i = 42; i <= 48; i++) {
                if (stats[i]) {
                    const cat = stats[i][0];
                    const val = parseNum(stats[i][1]);
                    if (cat) {
                        expenses[String(cat).trim()] = val;
                        expTotal += val;
                    }
                }
            }

            // Income from stats (row 52-55, col A=0, B=1)
            const incomes = {};
            let incTotal = 0;
            for (let i = 52; i <= 55; i++) {
                if (stats[i]) {
                    const cat = stats[i][0];
                    const val = parseNum(stats[i][1]);
                    if (cat) {
                        incomes[String(cat).trim()] = val;
                        incTotal += val;
                    }
                }
            }

            // Update cards
            document.getElementById('totalAttended').textContent = attended;
            document.getElementById('totalExpense').textContent = '฿' + fmt(expTotal);
            document.getElementById('totalIncome').textContent = '฿' + fmt(incTotal);

            // Expense breakdown
            let expHtml = Object.entries(expenses)
                .filter(([cat, val]) => cat && val > 0)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, val]) => `<div class="breakdown-card"><h4>${cat}</h4><div class="amount">฿${fmt(val)}</div></div>`)
                .join('');
            expHtml += `<div class="total-card"><h4>TOTAL EXPENSES</h4><div class="amount">฿${fmt(expTotal)}</div></div>`;
            document.getElementById('expenseBreakdown').innerHTML = expHtml;

            // Income breakdown
            let incHtml = Object.entries(incomes)
                .filter(([cat, val]) => cat && val > 0)
                .sort((a, b) => b[1] - a[1])
                .map(([cat, val]) => `<div class="breakdown-card"><h4>${cat}</h4><div class="amount">฿${fmt(val)}</div></div>`)
                .join('');
            incHtml += `<div class="total-card"><h4>TOTAL INCOME</h4><div class="amount">฿${fmt(incTotal)}</div></div>`;
            document.getElementById('incomeBreakdown').innerHTML = incHtml;
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
